# =============================================================
# Spark Defaults Configuration
# DataStack Huawei Cloud - SeaweedFS S3 Storage
# =============================================================

# ----- Master -----
# Nomes de servico do Swarm (nao hostname de VM: "node-1" nao resolve na rede
# overlay, so nomes de servico como "spark-master" resolvem).
spark.master                            spark://spark-master:7077

# ----- S3A / SeaweedFS -----
spark.hadoop.fs.s3a.endpoint            http://seaweedfs-filer-1:8333
spark.hadoop.fs.s3a.access.key          seaweedfs_access_CHANGE_ME
spark.hadoop.fs.s3a.secret.key          seaweedfs_secret_CHANGE_ME
spark.hadoop.fs.s3a.path.style.access   true
spark.hadoop.fs.s3a.impl                org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled false
spark.hadoop.fs.s3a.aws.credentials.provider org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
# Compatibilidade com SeaweedFS (S3 nao-AWS):
# - multiobjectdelete off: o delete em lote (DeleteObjects) do committer retorna
#   InternalError no SeaweedFS; com isso o S3A apaga objeto a objeto.
# - fileoutputcommitter v2: menos renames (rename em S3 = copy+delete, lento/fragil).
spark.hadoop.fs.s3a.multiobjectdelete.enable false
spark.hadoop.mapreduce.fileoutputcommitter.algorithm.version 2

# ----- S3A Magic Committer (SeaweedFS) -----
# O FileOutputCommitter (v1 e v2) finaliza com RENAME = COPY server-side, que o
# SeaweedFS rejeita ("Copy Source must mention the source bucket and key") - o
# sintoma e um hang silencioso de minutos (retry/backoff do S3A), nao um erro.
# O magic committer escreve direto no destino via multipart (sem rename).
# Requer spark-hadoop-cloud no classpath de TODOS os nos (bind mount em
# stacks/06-datastack.yml a partir de config/spark/jars/).
spark.hadoop.fs.s3a.committer.name      magic
spark.hadoop.fs.s3a.committer.magic.enabled true
spark.sql.sources.commitProtocolClass   org.apache.spark.internal.io.cloud.PathOutputCommitProtocol
spark.sql.parquet.output.committer.class org.apache.spark.internal.io.cloud.BindingParquetOutputCommitter

# ----- Hive Metastore -----
spark.sql.catalogImplementation         hive
spark.hadoop.hive.metastore.uris        thrift://hive-metastore:9083
spark.sql.hive.metastore.version        3.1.3

# ----- Executor Resources -----
spark.executor.memory                   8g
spark.executor.cores                    4
spark.driver.memory                     4g
spark.driver.cores                      2

# ----- Dynamic Allocation -----
spark.dynamicAllocation.enabled         true
spark.dynamicAllocation.minExecutors    1
spark.dynamicAllocation.maxExecutors    10
spark.dynamicAllocation.initialExecutors 2
spark.shuffle.service.enabled           true

# ----- Serialization -----
spark.serializer                        org.apache.spark.serializer.KryoSerializer
spark.kryoserializer.buffer.max         256m

# ----- SQL -----
spark.sql.adaptive.enabled              true
spark.sql.adaptive.coalescePartitions.enabled true
spark.sql.shuffle.partitions            200
spark.sql.warehouse.dir                 s3a://warehouse/

# ----- Network -----
spark.network.timeout                   300s
spark.rpc.askTimeout                    120s
spark.executor.heartbeatInterval        60s

# ----- History Server -----
# O dir NAO pode ser a raiz do bucket (s3a://spark-logs/): o Spark lanca
# "path must be absolute" ao resolver o caminho do event log. Usar subpath.
spark.eventLog.enabled                  true
spark.eventLog.dir                      s3a://spark-logs/events/
spark.history.fs.logDirectory           s3a://spark-logs/events/
