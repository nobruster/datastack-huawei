# Trino Delta Lake Catalog - Worker
# direto em s3a:// (landing/bronze/prata/ouro), sem passar por saveAsTable.
# Compartilha o mesmo Hive Metastore (para o catalogo de schemas/tabelas) e o
# mesmo endpoint S3A/SeaweedFS que o catalogo "hive".
connector.name=delta_lake

# Hive Metastore (armazena so metadados: schema/tabela -> localizacao S3)
hive.metastore.uri=thrift://hive-metastore:9083

# SeaweedFS S3 como storage - filesystem S3 NATIVO do Trino (fs.native-s3 /
# trino-filesystem-s3), nao o legado baseado em Hadoop (hive.s3.*). O plugin
# delta-lake desta imagem nao empacota hadoop-aws (sem
# org.apache.hadoop.fs.s3a.S3AFileSystem no classpath) - so tem
# trino-filesystem-s3-435.jar. hive.s3.* falha com ClassNotFoundException.
fs.native-s3.enabled=true
s3.endpoint=http://seaweedfs-filer-1:8333
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=seaweedfs_access_CHANGE_ME
s3.aws-secret-key=seaweedfs_secret_CHANGE_ME

# register_table: anexa uma tabela Delta ja existente (escrita por Spark via
# .save(path), sem metastore) ao catalogo, sem reescrever dado nenhum. Desligado
# por padrao no Trino 435 por seguranca - precisa habilitar explicitamente.
delta.register-table-procedure.enabled=true
