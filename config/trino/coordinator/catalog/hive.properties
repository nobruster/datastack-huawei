# Trino Hive Catalog - conecta ao Hive Metastore + SeaweedFS S3
connector.name=hive

# Hive Metastore
hive.metastore.uri=thrift://hive-metastore:9083

# SeaweedFS S3 como storage - filesystem S3 NATIVO (ver delta.properties: esta
# imagem nao tem hadoop-aws no plugin, hive.s3.* falha com ClassNotFoundException).
fs.native-s3.enabled=true
s3.endpoint=http://seaweedfs-filer-1:8333
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=seaweedfs_access_CHANGE_ME
s3.aws-secret-key=seaweedfs_secret_CHANGE_ME

# Permissoes
hive.allow-drop-table=true
hive.allow-rename-table=true
hive.allow-add-column=true
hive.allow-drop-column=true
hive.allow-rename-column=true

# Performance
hive.max-partitions-per-scan=1000000
hive.max-outstanding-splits-size=256MB
hive.domain-compaction-threshold=512
