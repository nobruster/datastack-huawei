# Trino Coordinator Configuration
coordinator=true
node-scheduler.include-coordinator=false
http-server.http.port=8080
discovery.uri=http://trino-coordinator:8080

# Memory
query.max-memory=50GB
query.max-memory-per-node=8GB

# Logging
log.path=/data/trino/var/log

# Spill
spill-enabled=true
spiller-spill-path=/data/trino/spill

# ---------------------------------------------------------------------------
# Autenticacao OIDC (Keycloak realm 'datastack')
# TLS termina no Traefik (trino.<eip>.sslip.io); process-forwarded=true faz o
# Trino confiar no X-Forwarded-Proto=https (requisito do OAuth2 sem TLS local).
# Hairpin resolvido igual oauth2-proxy: browser usa a URL EXTERNA (auth-url);
# back-channel (token/jwks/userinfo) usa http://keycloak:8080 INTERNO. Por isso
# oidc.discovery=false (o discovery so exporia URLs externas inalcancaveis).
# ---------------------------------------------------------------------------
http-server.authentication.type=oauth2
web-ui.authentication.type=oauth2
http-server.process-forwarded=true

http-server.authentication.oauth2.issuer=https://keycloak.<eip>.sslip.io/realms/datastack
http-server.authentication.oauth2.oidc.discovery=false
http-server.authentication.oauth2.auth-url=https://keycloak.<eip>.sslip.io/realms/datastack/protocol/openid-connect/auth
http-server.authentication.oauth2.token-url=http://keycloak:8080/realms/datastack/protocol/openid-connect/token
http-server.authentication.oauth2.jwks-url=http://keycloak:8080/realms/datastack/protocol/openid-connect/certs
http-server.authentication.oauth2.userinfo-url=http://keycloak:8080/realms/datastack/protocol/openid-connect/userinfo
http-server.authentication.oauth2.end-session-url=https://keycloak.<eip>.sslip.io/realms/datastack/protocol/openid-connect/logout
http-server.authentication.oauth2.client-id=trino
http-server.authentication.oauth2.client-secret=trino-oidc-secret-CHANGE-ME
http-server.authentication.oauth2.principal-field=preferred_username
http-server.authentication.oauth2.scopes=openid,email,profile

# Comunicacao interna cifra/assina com segredo compartilhado (obrigatorio
# quando ha autenticacao). MESMO valor em coordinator e todos os workers.
internal-communication.shared-secret=trino-internal-shared-secret-CHANGE-ME
