# Traefik static config. Ingress unico do cluster: termina TLS e roteia por
# hostname (sslip.io). Roteamento dinamico vem de /etc/traefik/dynamic/*.yml.
global:
  checkNewVersion: false
  sendAnonymousUsage: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true

api:
  dashboard: true
  insecure: false

log:
  level: INFO
accessLog: {}
