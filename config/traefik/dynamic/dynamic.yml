# Traefik dynamic config: TLS, middlewares, routers e services.
# Hostnames via sslip.io (<algo>.<eip>.sslip.io -> EIP, sem DNS proprio).
tls:
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/tls/ingress.crt
        keyFile: /etc/traefik/tls/ingress.key
  certificates:
    - certFile: /etc/traefik/tls/ingress.crt
      keyFile: /etc/traefik/tls/ingress.key

http:
  routers:
    # --- Keycloak (publico, sem auth) ---
    keycloak:
      rule: "Host(`keycloak.<eip>.sslip.io`)"
      entryPoints: [websecure]
      service: keycloak
      tls: {}

    # --- SeaweedFS Admin (protegido por SSO). O host inteiro vai pro
    #     oauth2-proxy inline, que faz login + proxy pro admin (inclui os
    #     endpoints /oauth2/* de callback/login no proprio host). ---
    seaweedfs-admin:
      rule: "Host(`seaweedfs.<eip>.sslip.io`)"
      entryPoints: [websecure]
      service: sso-seaweedfs
      tls: {}

    # --- Trino (auth OIDC NATIVA no proprio Trino, nao via oauth2-proxy).
    #     Traefik so termina TLS e encaminha; o Trino faz o fluxo OAuth2 com
    #     o Keycloak (precisa de X-Forwarded-Proto=https -> process-forwarded). ---
    trino:
      rule: "Host(`trino.<eip>.sslip.io`)"
      entryPoints: [websecure]
      service: trino
      tls: {}

    # --- JupyterHub (auth OIDC nativa via GenericOAuthenticator no Hub). ---
    jupyter:
      rule: "Host(`jupyter.<eip>.sslip.io`)"
      entryPoints: [websecure]
      service: jupyter
      tls: {}

    # --- Dashboard do proprio Traefik (api@internal = read-only: mostra
    #     routers/services/middlewares, nao altera config). Acesso restrito
    #     pelo Security Group (origem unica). Dashboard fica em /dashboard/. ---
    traefik-dashboard:
      rule: "Host(`traefik.<eip>.sslip.io`)"
      entryPoints: [websecure]
      service: api@internal
      tls: {}

  services:
    keycloak:
      loadBalancer:
        servers:
          - url: "http://keycloak:8080"
    sso-seaweedfs:
      loadBalancer:
        servers:
          - url: "http://sso-seaweedfs:4180"
    trino:
      loadBalancer:
        servers:
          - url: "http://trino-coordinator:8080"
    jupyter:
      loadBalancer:
        servers:
          - url: "http://jupyterhub:8000"
