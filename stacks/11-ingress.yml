version: "3.8"

# =============================================================================
# INGRESS + SSO - Traefik (ingress/TLS) + Keycloak (IdP) + oauth2-proxy (forward-auth)
# Ponto de entrada unico do cluster. Roteamento por hostname via sslip.io
# (<servico>.<eip>.sslip.io resolve pro EIP sem DNS proprio).
# Traefik termina TLS (cert self-signed) e aplica SSO nos dashboards.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Traefik - ingress, publica 80/443, roteamento via file provider
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.1
    command:
      - --configfile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/datastack/config/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /opt/datastack/config/traefik/dynamic:/etc/traefik/dynamic:ro
      - /opt/datastack/config/traefik/tls:/etc/traefik/tls:ro
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 10s

  # ---------------------------------------------------------------------------
  # Keycloak - Identity Provider (OIDC). Backend no Postgres (db keycloak).
  # UI: https://keycloak.<eip>.sslip.io  (admin master: admin)
  # Importa o realm 'datastack' (client oauth2-proxy + usuario admin) no boot.
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password_CHANGE_ME
      KC_HOSTNAME: https://keycloak.<eip>.sslip.io
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: keycloak_admin_CHANGE_ME
    volumes:
      - /opt/datastack/config/keycloak/realm-datastack.json:/opt/keycloak/data/import/realm-datastack.json:ro
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 15s
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ---------------------------------------------------------------------------
  # SSO CENTRAL - oauth2-proxy em modo Traefik ForwardAuth (UM proxy p/ todos).
  # Nao faz mais proxy reverso de um upstream especifico. O middleware `sso-auth`
  # (Traefik, em dynamic.yml) chama a RAIZ deste proxy (http://sso-auth:4180/):
  # se a sessao for valida o proxy devolve 200 (via --upstream=static://200) e o
  # Traefik libera pro backend; senao devolve 302 -> login do Keycloak, que o
  # forwardAuth repassa VERBATIM (redirect de verdade no browser). Os endpoints
  # /oauth2/* (start/callback/sign_in) voltam pra ca por host (router sso-oauth).
  # Uma instancia / um client / um secret / um cookie (_oauth2_proxy no dominio
  # .sslip.io) -> SSO real: login unico entre todos os dashboards.
  # Hairpin: o container nao alcanca o EIP, entao redeem/jwks usam a URL
  # INTERNA (http://keycloak:8080); so o login (browser) usa a URL externa.
  # --upstream=static://200 responde 200 na raiz p/ o ramo "autenticado" do
  # forwardAuth (oauth2-proxy tambem exige um upstream configurado p/ subir).
  # ---------------------------------------------------------------------------
  sso-auth:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    command:
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true
      - --provider=oidc
      - --skip-oidc-discovery=true
      - --oidc-issuer-url=https://keycloak.<eip>.sslip.io/realms/datastack
      - --login-url=https://keycloak.<eip>.sslip.io/realms/datastack/protocol/openid-connect/auth
      - --redeem-url=http://keycloak:8080/realms/datastack/protocol/openid-connect/token
      - --oidc-jwks-url=http://keycloak:8080/realms/datastack/protocol/openid-connect/certs
      - --client-id=oauth2-proxy
      - --client-secret=oauth2-proxy-secret-CHANGE-ME
      - --redirect-url=https://seaweedfs.<eip>.sslip.io/oauth2/callback
      - --cookie-domain=.<eip>.sslip.io
      - --whitelist-domain=.<eip>.sslip.io
      - --cookie-secret=datastack_sso_cookie_secret_32by
      - --cookie-secure=true
      - --email-domain=*
      - --skip-provider-button=true
      - --set-xauthrequest=true
      - --upstream=static://200
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 10s

networks:
  datastack-net:
    external: true
