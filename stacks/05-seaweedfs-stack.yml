version: "3.8"

services:
  # SeaweedFS Master node-1
  seaweedfs-master-1:
    image: chrislusf/seaweedfs:4.37
    command: master -ip=seaweedfs-master-1 -ip.bind=0.0.0.0 -port=9333 -mdir=/data -peers=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -defaultReplication=010
    volumes:
      - seaweedfs-master-1:/data
    # 9333 (master API/UI) fechada: acesso agora via
    # https://seaweedfs-master.<eip>.sslip.io (Traefik + SSO).
    # 19333 (peer gRPC entre masters) continua publicada.
    ports:
      - target: 19333
        published: 19333
        mode: host
    networks:
      - datastack-net
    deploy:
      endpoint_mode: dnsrr
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 10s

  # SeaweedFS Master node-2
  seaweedfs-master-2:
    image: chrislusf/seaweedfs:4.37
    command: master -ip=seaweedfs-master-2 -ip.bind=0.0.0.0 -port=9333 -mdir=/data -peers=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -defaultReplication=010
    volumes:
      - seaweedfs-master-2:/data
    # 9333 (master API/UI) fechada: acesso agora via
    # https://seaweedfs-master.<eip>.sslip.io (Traefik + SSO).
    # 19333 (peer gRPC entre masters) continua publicada.
    ports:
      - target: 19333
        published: 19333
        mode: host
    networks:
      - datastack-net
    deploy:
      endpoint_mode: dnsrr
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-2
      restart_policy:
        condition: any
        delay: 10s

  # SeaweedFS Master node-3
  seaweedfs-master-3:
    image: chrislusf/seaweedfs:4.37
    command: master -ip=seaweedfs-master-3 -ip.bind=0.0.0.0 -port=9333 -mdir=/data -peers=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -defaultReplication=010
    volumes:
      - seaweedfs-master-3:/data
    # 9333 (master API/UI) fechada: acesso agora via
    # https://seaweedfs-master.<eip>.sslip.io (Traefik + SSO).
    # 19333 (peer gRPC entre masters) continua publicada.
    ports:
      - target: 19333
        published: 19333
        mode: host
    networks:
      - datastack-net
    deploy:
      endpoint_mode: dnsrr
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-3
      restart_policy:
        condition: any
        delay: 10s

  # SeaweedFS Volume node-1
  seaweedfs-volume-1:
    image: chrislusf/seaweedfs:4.37
    command: volume -ip.bind=0.0.0.0 -mserver=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -port=8081 -dir=/data -max=0 -dataCenter=dc1 -rack=rack1
    volumes:
      - /data/seaweedfs/volume:/data
    ports:
      - target: 8081
        published: 8081
        mode: host
      - target: 18080
        published: 18080
        mode: host
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 10s

  # SeaweedFS Volume node-2
  seaweedfs-volume-2:
    image: chrislusf/seaweedfs:4.37
    command: volume -ip.bind=0.0.0.0 -mserver=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -port=8081 -dir=/data -max=0 -dataCenter=dc1 -rack=rack2
    volumes:
      - /data/seaweedfs/volume:/data
    ports:
      - target: 8081
        published: 8081
        mode: host
      - target: 18080
        published: 18080
        mode: host
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-2
      restart_policy:
        condition: any
        delay: 10s

  # SeaweedFS Volume node-3
  seaweedfs-volume-3:
    image: chrislusf/seaweedfs:4.37
    command: volume -ip.bind=0.0.0.0 -mserver=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -port=8081 -dir=/data -max=0 -dataCenter=dc1 -rack=rack3
    volumes:
      - /data/seaweedfs/volume:/data
    ports:
      - target: 8081
        published: 8081
        mode: host
      - target: 18080
        published: 18080
        mode: host
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-3
      restart_policy:
        condition: any
        delay: 10s

  # SeaweedFS Filer node-1 (S3 API porta 8333)
  seaweedfs-filer-1:
    image: chrislusf/seaweedfs:4.37
    command: filer -ip.bind=0.0.0.0 -master=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -port=8888 -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3config.json
    volumes:
      - seaweedfs-filer-1:/data
      - /opt/datastack/config/seaweedfs/s3config.json:/etc/seaweedfs/s3config.json:ro
    # 8888 (filer UI) fechada: acesso agora via
    # https://seaweedfs-filer.<eip>.sslip.io (Traefik + SSO).
    # 8333 (S3 API, usado por Spark/Trino via overlay e potencialmente
    # clientes S3 externos) continua publicada.
    ports:
      - target: 8333
        published: 8333
        mode: host
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 10s

  # SeaweedFS Filer node-2
  seaweedfs-filer-2:
    image: chrislusf/seaweedfs:4.37
    command: filer -ip.bind=0.0.0.0 -master=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -port=8888 -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3config.json
    volumes:
      - seaweedfs-filer-2:/data
      - /opt/datastack/config/seaweedfs/s3config.json:/etc/seaweedfs/s3config.json:ro
    # 8888 (filer UI) fechada: acesso agora via
    # https://seaweedfs-filer.<eip>.sslip.io (Traefik + SSO).
    # 8333 (S3 API, usado por Spark/Trino via overlay e potencialmente
    # clientes S3 externos) continua publicada.
    ports:
      - target: 8333
        published: 8333
        mode: host
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-2
      restart_policy:
        condition: any
        delay: 10s

  # SeaweedFS Filer node-3
  seaweedfs-filer-3:
    image: chrislusf/seaweedfs:4.37
    command: filer -ip.bind=0.0.0.0 -master=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -port=8888 -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3config.json
    volumes:
      - seaweedfs-filer-3:/data
      - /opt/datastack/config/seaweedfs/s3config.json:/etc/seaweedfs/s3config.json:ro
    # 8888 (filer UI) fechada: acesso agora via
    # https://seaweedfs-filer.<eip>.sslip.io (Traefik + SSO).
    # 8333 (S3 API, usado por Spark/Trino via overlay e potencialmente
    # clientes S3 externos) continua publicada.
    ports:
      - target: 8333
        published: 8333
        mode: host
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-3
      restart_policy:
        condition: any
        delay: 10s

  # ---------------------------------------------------------------------------
  # SeaweedFS Admin Dashboard (node-1)
  # Todo o cluster (master/volume/filer/admin) roda a mesma versao 4.37 (latest).
  # Roda HTTP interno, SEM porta publicada e SEM auth propria (-adminPassword
  # vazio): o acesso e feito via Traefik em https://seaweedfs.<eip>.sslip.io,
  # protegido por SSO (Keycloak/oauth2-proxy). Ver stacks/11-ingress.yml.
  # ---------------------------------------------------------------------------
  seaweedfs-admin:
    image: chrislusf/seaweedfs:4.37
    command: admin -port=23646 -masters=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -dataDir=/data
    volumes:
      - seaweedfs-admin:/data
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 10s

volumes:
  seaweedfs-master-1:
  seaweedfs-master-2:
  seaweedfs-master-3:
  seaweedfs-filer-1:
  seaweedfs-filer-2:
  seaweedfs-filer-3:
  seaweedfs-admin:

networks:
  datastack-net:
    external: true
