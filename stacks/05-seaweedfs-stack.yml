version: "3.8"

services:
  # SeaweedFS Master node-1
  seaweedfs-master-1:
    image: chrislusf/seaweedfs:3.65
    command: master -ip=node-1 -port=9333 -mdir=/data -peers=node-1:9333,node-2:9333,node-3:9333 -defaultReplication=010
    volumes:
      - seaweedfs-master-1:/data
    ports:
      - "9333:9333"
      - "19333:19333"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Master node-2
  seaweedfs-master-2:
    image: chrislusf/seaweedfs:3.65
    command: master -ip=node-2 -port=9333 -mdir=/data -peers=node-1:9333,node-2:9333,node-3:9333 -defaultReplication=010
    volumes:
      - seaweedfs-master-2:/data
    ports:
      - "9333:9333"
      - "19333:19333"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-2
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Master node-3
  seaweedfs-master-3:
    image: chrislusf/seaweedfs:3.65
    command: master -ip=node-3 -port=9333 -mdir=/data -peers=node-1:9333,node-2:9333,node-3:9333 -defaultReplication=010
    volumes:
      - seaweedfs-master-3:/data
    ports:
      - "9333:9333"
      - "19333:19333"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-3
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Volume node-1
  seaweedfs-volume-1:
    image: chrislusf/seaweedfs:3.65
    command: volume -mserver=node-1:9333,node-2:9333,node-3:9333 -port=8080 -dir=/data -max=0 -dataCenter=dc1 -rack=rack1
    volumes:
      - /mnt/data/seaweedfs:/data
    ports:
      - "8080:8080"
      - "18080:18080"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Volume node-2
  seaweedfs-volume-2:
    image: chrislusf/seaweedfs:3.65
    command: volume -mserver=node-1:9333,node-2:9333,node-3:9333 -port=8080 -dir=/data -max=0 -dataCenter=dc1 -rack=rack2
    volumes:
      - /mnt/data/seaweedfs:/data
    ports:
      - "8080:8080"
      - "18080:18080"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-2
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Volume node-3
  seaweedfs-volume-3:
    image: chrislusf/seaweedfs:3.65
    command: volume -mserver=node-1:9333,node-2:9333,node-3:9333 -port=8080 -dir=/data -max=0 -dataCenter=dc1 -rack=rack3
    volumes:
      - /mnt/data/seaweedfs:/data
    ports:
      - "8080:8080"
      - "18080:18080"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-3
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Filer node-1 (S3 API porta 8333)
  seaweedfs-filer-1:
    image: chrislusf/seaweedfs:3.65
    command: filer -master=node-1:9333,node-2:9333,node-3:9333 -port=8888 -s3 -s3.port=8333
    volumes:
      - seaweedfs-filer-1:/data
    ports:
      - "8888:8888"
      - "8333:8333"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Filer node-2
  seaweedfs-filer-2:
    image: chrislusf/seaweedfs:3.65
    command: filer -master=node-1:9333,node-2:9333,node-3:9333 -port=8888 -s3 -s3.port=8333
    volumes:
      - seaweedfs-filer-2:/data
    ports:
      - "8888:8888"
      - "8333:8333"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-2
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Filer node-3
  seaweedfs-filer-3:
    image: chrislusf/seaweedfs:3.65
    command: filer -master=node-1:9333,node-2:9333,node-3:9333 -port=8888 -s3 -s3.port=8333
    volumes:
      - seaweedfs-filer-3:/data
    ports:
      - "8888:8888"
      - "8333:8333"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-3
      restart_policy:
        condition: on-failure
        delay: 10s

volumes:
  seaweedfs-master-1:
  seaweedfs-master-2:
  seaweedfs-master-3:
  seaweedfs-filer-1:
  seaweedfs-filer-2:
  seaweedfs-filer-3:

networks:
  datastack-net:
    external: true
