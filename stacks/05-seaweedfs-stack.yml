version: "3.8"

services:
  # SeaweedFS Master node-1
  seaweedfs-master-1:
    image: chrislusf/seaweedfs:3.65
    command: master -ip=seaweedfs-master-1 -ip.bind=0.0.0.0 -port=9333 -mdir=/data -peers=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -defaultReplication=010
    volumes:
      - seaweedfs-master-1:/data
    ports:
      - target: 9333
        published: 9333
        mode: host
      - target: 19333
        published: 19333
        mode: host
    networks:
      - datastack-net
    deploy:
      endpoint_mode: dnsrr
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Master node-2
  seaweedfs-master-2:
    image: chrislusf/seaweedfs:3.65
    command: master -ip=seaweedfs-master-2 -ip.bind=0.0.0.0 -port=9333 -mdir=/data -peers=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -defaultReplication=010
    volumes:
      - seaweedfs-master-2:/data
    ports:
      - target: 9333
        published: 9333
        mode: host
      - target: 19333
        published: 19333
        mode: host
    networks:
      - datastack-net
    deploy:
      endpoint_mode: dnsrr
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-2
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Master node-3
  seaweedfs-master-3:
    image: chrislusf/seaweedfs:3.65
    command: master -ip=seaweedfs-master-3 -ip.bind=0.0.0.0 -port=9333 -mdir=/data -peers=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -defaultReplication=010
    volumes:
      - seaweedfs-master-3:/data
    ports:
      - target: 9333
        published: 9333
        mode: host
      - target: 19333
        published: 19333
        mode: host
    networks:
      - datastack-net
    deploy:
      endpoint_mode: dnsrr
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-3
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Volume node-1
  seaweedfs-volume-1:
    image: chrislusf/seaweedfs:3.65
    command: volume -ip.bind=0.0.0.0 -mserver=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -port=8081 -dir=/data -max=0 -dataCenter=dc1 -rack=rack1
    volumes:
      - /data/seaweedfs/volume:/data
    ports:
      - target: 8081
        published: 8081
        mode: host
      - target: 18080
        published: 18080
        mode: host
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Volume node-2
  seaweedfs-volume-2:
    image: chrislusf/seaweedfs:3.65
    command: volume -ip.bind=0.0.0.0 -mserver=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -port=8081 -dir=/data -max=0 -dataCenter=dc1 -rack=rack2
    volumes:
      - /data/seaweedfs/volume:/data
    ports:
      - target: 8081
        published: 8081
        mode: host
      - target: 18080
        published: 18080
        mode: host
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-2
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Volume node-3
  seaweedfs-volume-3:
    image: chrislusf/seaweedfs:3.65
    command: volume -ip.bind=0.0.0.0 -mserver=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -port=8081 -dir=/data -max=0 -dataCenter=dc1 -rack=rack3
    volumes:
      - /data/seaweedfs/volume:/data
    ports:
      - target: 8081
        published: 8081
        mode: host
      - target: 18080
        published: 18080
        mode: host
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-3
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Filer node-1 (S3 API porta 8333)
  seaweedfs-filer-1:
    image: chrislusf/seaweedfs:3.65
    command: filer -ip.bind=0.0.0.0 -master=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -port=8888 -s3 -s3.port=8333
    volumes:
      - seaweedfs-filer-1:/data
    ports:
      - target: 8888
        published: 8888
        mode: host
      - target: 8333
        published: 8333
        mode: host
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Filer node-2
  seaweedfs-filer-2:
    image: chrislusf/seaweedfs:3.65
    command: filer -ip.bind=0.0.0.0 -master=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -port=8888 -s3 -s3.port=8333
    volumes:
      - seaweedfs-filer-2:/data
    ports:
      - target: 8888
        published: 8888
        mode: host
      - target: 8333
        published: 8333
        mode: host
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-2
      restart_policy:
        condition: on-failure
        delay: 10s

  # SeaweedFS Filer node-3
  seaweedfs-filer-3:
    image: chrislusf/seaweedfs:3.65
    command: filer -ip.bind=0.0.0.0 -master=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -port=8888 -s3 -s3.port=8333
    volumes:
      - seaweedfs-filer-3:/data
    ports:
      - target: 8888
        published: 8888
        mode: host
      - target: 8333
        published: 8333
        mode: host
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-3
      restart_policy:
        condition: on-failure
        delay: 10s

  # ---------------------------------------------------------------------------
  # SeaweedFS Admin Dashboard (node-1) - UI: http://<ip-node-1>:23646
  # O subcomando `admin` so existe a partir da 3.80; o resto do cluster roda
  # 3.65 (o admin fala com os masters via gRPC, compativel). Login/senha via
  # -adminUser/-adminPassword (se a senha ficar vazia, a auth e desabilitada).
  # ---------------------------------------------------------------------------
  seaweedfs-admin:
    image: chrislusf/seaweedfs:3.95
    # HTTPS habilitado via security.toml ([https.admin]) - obrigatorio para
    # acesso pelo IP/EIP: o cookie de sessao do admin e Secure, entao so
    # trafega por HTTPS (ou localhost). Acesse https://<ip-node-1>:23646
    command: admin -port=23646 -masters=seaweedfs-master-1:9333,seaweedfs-master-2:9333,seaweedfs-master-3:9333 -dataDir=/data -adminUser=admin -adminPassword=seaweedfs_admin_CHANGE_ME
    volumes:
      - seaweedfs-admin:/data
      - /opt/datastack/config/seaweedfs/security.toml:/etc/seaweedfs/security.toml:ro
      - /opt/datastack/config/seaweedfs/tls:/etc/seaweedfs/tls:ro
    ports:
      - "23646:23646"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: on-failure
        delay: 10s

volumes:
  seaweedfs-master-1:
  seaweedfs-master-2:
  seaweedfs-master-3:
  seaweedfs-filer-1:
  seaweedfs-filer-2:
  seaweedfs-filer-3:
  seaweedfs-admin:

networks:
  datastack-net:
    external: true
