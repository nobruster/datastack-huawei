version: "3.8"

services:
  # =============================================
  # REDIS - Cache para Superset
  # =============================================
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 4gb --maxmemory-policy allkeys-lru
    # 6379 fechada: Redis so e usado internamente (Superset), via overlay
    # (redis:6379). Sem router Traefik/uso externo legitimo.
    volumes:
      - redis-data:/data
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 5s
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =============================================
  # JUPYTERHUB
  # =============================================
  jupyterhub:
    # Imagem custom (build local no node-1): jupyterhub 4.1 + oauthenticator +
    # dockerspawner. Ver /tmp/jhbuild/Dockerfile. Nao esta em registry, entao o
    # servico esta pinado no node-1 (onde a imagem existe).
    image: datastack/jupyterhub:4.1-oidc
    environment:
      - JUPYTERHUB_ADMIN=admin
    # 8000 fechada: acesso agora via https://jupyter.<eip>.sslip.io
    # (Traefik, OIDC nativo do Hub).
    volumes:
      - jupyterhub-data:/srv/jupyterhub
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/datastack/config/jupyterhub/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 10s

  # =============================================
  # APACHE SUPERSET
  # =============================================
  superset:
    # Imagem custom (build local no node-1): apache/superset 3.1.3 + Authlib
    # (obrigatorio para AUTH_OAUTH/SSO via Keycloak; nao vem na imagem
    # oficial). Ver config/superset/Dockerfile. Nao esta em registry, entao
    # fica pinado no node-1 (onde a imagem existe) - mesmo padrao do
    # datastack/jupyterhub:4.1-oidc.
    image: datastack/superset:3.1.3-oidc
    environment:
      - SUPERSET_SECRET_KEY=superset_secret_CHANGE_ME
      - SUPERSET_OIDC_CLIENT_SECRET=superset-oidc-secret-CHANGE-ME
      - REDIS_URL=redis://redis:6379/0
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://superset:superset_password_CHANGE_ME@postgres:5432/superset
      - SUPERSET_WEBSERVER_PORT=8088
      - PYTHONPATH=/app/pythonpath
    # 8088 fechada: acesso agora via https://superset.<eip>.sslip.io
    # (Traefik, OIDC nativo do Flask-AppBuilder).
    volumes:
      - superset-data:/app/superset_home
      - /opt/datastack/config/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 15s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # =============================================
  # SUPERSET WORKER (Celery para cache/queries async)
  # =============================================
  superset-worker:
    image: datastack/superset:3.1.3-oidc
    command: celery --app=superset.tasks.celery_app:app worker --loglevel=info
    environment:
      - SUPERSET_SECRET_KEY=superset_secret_CHANGE_ME
      - SUPERSET_OIDC_CLIENT_SECRET=superset-oidc-secret-CHANGE-ME
      - REDIS_URL=redis://redis:6379/0
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://superset:superset_password_CHANGE_ME@postgres:5432/superset
      - PYTHONPATH=/app/pythonpath
    volumes:
      - superset-data:/app/superset_home
      - /opt/datastack/config/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    networks:
      - datastack-net
    # A imagem apache/superset traz um HEALTHCHECK embutido que testa a porta
    # web (8088). O worker Celery nao serve HTTP, entao sem desabilitar o
    # healthcheck o Swarm mata o container ~90s depois do "ready" - o worker
    # sobe, fica pronto e morre em loop (ou fica morto de vez com on-failure,
    # ja que o warm shutdown sai com exit 0).
    healthcheck:
      disable: true
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 15s

  # =============================================
  # PORTAINER - Gerenciamento Docker Swarm
  # =============================================
  portainer:
    image: portainer/portainer-ce:2.20.3
    command: -H unix:///var/run/docker.sock
    # 9000/9443 fechadas (2026-07-04): acesso via https://portainer.<eip>.sslip.io
    # (Traefik) com OAuth OIDC nativo do Portainer -> Keycloak (client "portainer",
    # UserIdentifier=preferred_username; login OAuth validado ponta a ponta via
    # authorization-code flow). A config OAuth vive no banco do Portainer
    # (volume portainer-data), aplicada via PUT /api/settings - nao neste YML.
    # Fallback anti-lockout: com OAuth ativo o Portainer CE so permite login
    # interno do ADMIN INICIAL ("admin") - usuarios internos criados depois
    # (ex. "superadmin") logam apenas via OAuth.
    volumes:
      - portainer-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 5s

  # =============================================
  # PORTAINER AGENT - todos os nos
  # =============================================
  portainer-agent:
    image: portainer/agent:2.20.3
    environment:
      - AGENT_CLUSTER_ADDR=tasks.portainer-agent
    ports:
      - target: 9001
        published: 9001
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - datastack-net
    deploy:
      mode: global
      restart_policy:
        condition: any
        delay: 5s

volumes:
  redis-data:
    driver: local
  jupyterhub-data:
    driver: local
  superset-data:
    driver: local
  portainer-data:
    driver: local

networks:
  datastack-net:
    external: true
