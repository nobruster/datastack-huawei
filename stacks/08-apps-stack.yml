version: "3.8"

services:
  # =============================================
  # REDIS - Cache para Superset
  # =============================================
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 4gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: on-failure
        delay: 5s
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =============================================
  # JUPYTERHUB
  # =============================================
  jupyterhub:
    # Imagem custom (build local no node-1): jupyterhub 4.1 + oauthenticator +
    # dockerspawner. Ver /tmp/jhbuild/Dockerfile. Nao esta em registry, entao o
    # servico esta pinado no node-1 (onde a imagem existe).
    image: datastack/jupyterhub:4.1-oidc
    environment:
      - JUPYTERHUB_ADMIN=admin
    ports:
      - "8000:8000"
    volumes:
      - jupyterhub-data:/srv/jupyterhub
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/datastack/config/jupyterhub/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py:ro
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: on-failure
        delay: 10s

  # =============================================
  # APACHE SUPERSET
  # =============================================
  superset:
    image: apache/superset:3.1.3
    environment:
      - SUPERSET_SECRET_KEY=superset_secret_CHANGE_ME
      - REDIS_URL=redis://redis:6379/0
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://superset:superset_password_CHANGE_ME@postgres:5432/superset
      - SUPERSET_WEBSERVER_PORT=8088
      - PYTHONPATH=/app/pythonpath
    ports:
      - "8088:8088"
    volumes:
      - superset-data:/app/superset_home
      - /opt/datastack/config/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: on-failure
        delay: 15s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # =============================================
  # SUPERSET WORKER (Celery para cache/queries async)
  # =============================================
  superset-worker:
    image: apache/superset:3.1.3
    command: celery --app=superset.tasks.celery_app:app worker --loglevel=info
    environment:
      - SUPERSET_SECRET_KEY=superset_secret_CHANGE_ME
      - REDIS_URL=redis://redis:6379/0
      - SQLALCHEMY_DATABASE_URI=postgresql+psycopg2://superset:superset_password_CHANGE_ME@postgres:5432/superset
      - PYTHONPATH=/app/pythonpath
    volumes:
      - superset-data:/app/superset_home
      - /opt/datastack/config/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: on-failure
        delay: 15s

  # =============================================
  # PORTAINER - Gerenciamento Docker Swarm
  # =============================================
  portainer:
    image: portainer/portainer-ce:2.20.3
    command: -H unix:///var/run/docker.sock
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - portainer-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: on-failure
        delay: 5s

  # =============================================
  # PORTAINER AGENT - todos os nos
  # =============================================
  portainer-agent:
    image: portainer/agent:2.20.3
    environment:
      - AGENT_CLUSTER_ADDR=tasks.portainer-agent
    ports:
      - target: 9001
        published: 9001
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - datastack-net
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 5s

volumes:
  redis-data:
    driver: local
  jupyterhub-data:
    driver: local
  superset-data:
    driver: local
  portainer-data:
    driver: local

networks:
  datastack-net:
    external: true
