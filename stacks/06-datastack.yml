version: "3.8"

# =============================================================================
# DataStack Core - PostgreSQL + Hive Metastore + Apache Spark + Trino
# Spark Master: node-1 only
# Spark Workers: node-2 and node-3 ONLY (NOT on node-1)
# Trino Coordinator: node-1
# Trino Workers: node-2 and node-3
# Storage: SeaweedFS S3, reached via service name (e.g. seaweedfs-filer-1:8333)
# All service-to-service traffic uses Swarm service DNS names, never VM
# hostnames (node-1/2/3) or the VM's real IP - neither resolves/routes from
# inside a container attached to the overlay network.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL (node-1) - backend para Hive Metastore e Superset
  # Containerizado (nao roda nativo no host): um Postgres native so seria
  # alcancavel por containers no MESMO no via docker_gwbridge, e nem isso
  # sem abrir pg_hba.conf para essa sub-rede - inviavel para trino-worker-*
  # em node-2/node-3, que tambem precisam do catalogo postgresql.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    # password_encryption=md5: o driver JDBC embutido no Hive 3.1.3 e antigo
    # demais para SCRAM-SHA-256 (padrao do Postgres 15) - "authentication
    # type 10 is not supported" sem isso.
    command: postgres -c shared_buffers=2GB -c effective_cache_size=6GB -c max_connections=200 -c password_encryption=md5
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_root_CHANGE_ME
    volumes:
      - /data/postgres:/var/lib/postgresql/data
      - /opt/datastack/config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Hive Metastore (node-1)
  # Stores metadata for Spark tables and Trino catalogs
  # ---------------------------------------------------------------------------
  hive-metastore:
    image: apache/hive:3.1.3
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      # IS_RESUME=true: pula o schematool -initSchema no boot (entrypoint faz
      # SKIP_SCHEMA_INIT="${IS_RESUME:-false}"). O schema do metastore ja foi
      # criado na 1a subida (no Postgres, db hive_metastore). Sem isto, TODO
      # restart re-roda o initSchema e falha com "relation BUCKETING_COLS
      # already exists" (exit 1) - o servico so subia da 1a vez, com o banco
      # vazio, e nao reiniciava mais.
      IS_RESUME: "true"
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/hive_metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive_password_CHANGE_ME
      # Poe o S3AFileSystem (hadoop-aws) no classpath do HMS: os jars ja vem na
      # imagem em tools/lib mas fora do classpath. Sem isso o CREATE SCHEMA/
      # register_table do Trino sobre location s3a:// falha com
      # ClassNotFoundException S3AFileSystem (HIVE_METASTORE_ERROR). O
      # entrypoint faz HADOOP_CLASSPATH=...:$HADOOP_CLASSPATH, preservando este.
      HADOOP_CLASSPATH: /opt/hadoop/share/hadoop/tools/lib/hadoop-aws-3.1.0.jar:/opt/hadoop/share/hadoop/tools/lib/aws-java-sdk-bundle-1.11.271.jar
    volumes:
      - hive_warehouse:/opt/hive/data/warehouse
      # core-site.xml com fs.s3a -> SeaweedFS (HADOOP_CONF_DIR=/opt/hive/conf)
      - /opt/datastack/config/hive/core-site.xml:/opt/hive/conf/core-site.xml:ro
    ports:
      - "9083:9083"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 30s
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9083"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Apache Spark Master (node-1 only)
  # High Availability via Docker Swarm restart policy
  # UI: http://<ip-node-1>:8090
  # ---------------------------------------------------------------------------
  spark-master:
    image: bitnamilegacy/spark:3.5
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      # Sem SPARK_MASTER_HOST: o container nao tem o IP real da VM em
      # nenhuma interface (so a rede overlay e o docker_gwbridge local),
      # e um bind explicito nele falha com BindException. Deixa o bitnami
      # auto-detectar o IP do proprio container.
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8090"
    volumes:
      - /opt/datastack/config/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      # spark-hadoop-cloud: PathOutputCommitProtocol/BindingParquetOutputCommitter
      # (magic committer) - nao vem na imagem bitnami; precisa estar em TODOS os
      # nos Spark ou executor falha com ClassNotFound.
      - /opt/datastack/config/spark/jars/spark-hadoop-cloud_2.12-3.5.6.jar:/opt/bitnami/spark/jars/spark-hadoop-cloud_2.12-3.5.6.jar:ro
      - spark_logs:/opt/bitnami/spark/logs
      # Pasta compartilhada de CODIGO (nao dados) entre Jupyter (/home/jovyan/shared),
      # spark-master (/opt/shared) e Airflow (/opt/shared) - mesmo /data/shared do
      # host (sticky 1777) montado nos 3. DADOS trafegam via s3a:// SEMPRE: os
      # executores em node-2/node-3 nao enxergam o disco local do node-1, so o
      # driver (que roda aqui, no master, via spark-submit) enxergaria /opt/shared.
      - /data/shared:/opt/shared
      # Jobs .py do Airflow (ro): permite os DAGs referenciarem o job direto por
      # caminho (/opt/datastack/jobs/<job>.py) no spark-submit, sem `docker cp`
      # previo (o scheduler ja monta o mesmo /opt/datastack/jobs, tambem ro).
      - /opt/datastack/jobs:/opt/datastack/jobs:ro
    # 8090 (UI) fechada: acesso agora via https://spark.<eip>.sslip.io
    # (Traefik + SSO). 7077 (RPC do master, usado por spark-submit/workers de
    # fora do overlay) continua publicada.
    ports:
      - "7077:7077"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Spark Worker on node-2
  # Port 8091 for UI
  # ---------------------------------------------------------------------------
  spark-worker-node2:
    image: bitnamilegacy/spark:3.5
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 40G
      SPARK_WORKER_CORES: "28"
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_WORKER_WEBUI_PORT: "8091"
    volumes:
      - /opt/datastack/config/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - /opt/datastack/config/spark/jars/spark-hadoop-cloud_2.12-3.5.6.jar:/opt/bitnami/spark/jars/spark-hadoop-cloud_2.12-3.5.6.jar:ro
      - spark_worker_data:/opt/bitnami/spark/work
    # 8091 (worker UI) fechada: baixo valor, sem router Traefik (decisao ja
    # tomada) - fica protegida pelo Security Group.
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-2
      restart_policy:
        condition: any
        delay: 15s
      resources:
        limits:
          memory: 48G
        reservations:
          memory: 32G

  # ---------------------------------------------------------------------------
  # Spark Worker on node-3
  # Port 8092 for UI
  # ---------------------------------------------------------------------------
  spark-worker-node3:
    image: bitnamilegacy/spark:3.5
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 40G
      SPARK_WORKER_CORES: "28"
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_WORKER_WEBUI_PORT: "8092"
    volumes:
      - /opt/datastack/config/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - /opt/datastack/config/spark/jars/spark-hadoop-cloud_2.12-3.5.6.jar:/opt/bitnami/spark/jars/spark-hadoop-cloud_2.12-3.5.6.jar:ro
      - spark_worker_data:/opt/bitnami/spark/work
    # 8092 (worker UI) fechada: baixo valor, sem router Traefik (decisao ja
    # tomada) - fica protegida pelo Security Group.
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-3
      restart_policy:
        condition: any
        delay: 15s
      resources:
        limits:
          memory: 48G
        reservations:
          memory: 32G

  # ---------------------------------------------------------------------------
  # Spark History Server (node-1)
  # Le os event logs gravados pelos jobs em s3a://spark-logs/ (SeaweedFS)
  # UI: http://<ip-node-1>:18081 (18080 ja e usado pela porta publica do
  # SeaweedFS Volume no mesmo no)
  # ---------------------------------------------------------------------------
  spark-history:
    image: bitnamilegacy/spark:3.5
    command: /opt/bitnami/spark/bin/spark-class org.apache.spark.deploy.history.HistoryServer
    environment:
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_DAEMON_JAVA_OPTS: "-Dspark.history.ui.port=18081"
    volumes:
      - /opt/datastack/config/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - spark_history_logs:/opt/bitnami/spark/logs
    # 18081 fechada: acesso agora via https://spark-history.<eip>.sslip.io
    # (Traefik + SSO).
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18081"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Trino Coordinator (node-1)
  # UI: http://<ip-node-1>:8080
  # ---------------------------------------------------------------------------
  trino-coordinator:
    image: trinodb/trino:435
    user: "1000:1000"
    volumes:
      - /opt/datastack/config/trino/coordinator:/etc/trino:ro
      - trino_data:/data/trino
    # 8080 fechada: allow-insecure-over-http=true nesse coordinator faz a
    # porta crua contornar o OAuth2 - esse era o objetivo de fechar. Acesso
    # SQL externo continua via https://trino.<eip>.sslip.io (OAuth2);
    # Superset usa trino-coordinator:8080 via overlay (nao afetado).
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 20s
      resources:
        limits:
          memory: 24G
        reservations:
          memory: 16G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Trino Worker on node-2
  # ---------------------------------------------------------------------------
  trino-worker-node2:
    image: trinodb/trino:435
    user: "1000:1000"
    volumes:
      - /opt/datastack/config/trino/worker:/etc/trino:ro
      - trino_worker_data:/data/trino
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-2
      restart_policy:
        condition: any
        delay: 20s
      resources:
        limits:
          memory: 48G
        reservations:
          memory: 32G

  # ---------------------------------------------------------------------------
  # Trino Worker on node-3
  # ---------------------------------------------------------------------------
  trino-worker-node3:
    image: trinodb/trino:435
    user: "1000:1000"
    volumes:
      - /opt/datastack/config/trino/worker:/etc/trino:ro
      - trino_worker_data:/data/trino
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-3
      restart_policy:
        condition: any
        delay: 20s
      resources:
        limits:
          memory: 48G
        reservations:
          memory: 32G

volumes:
  hive_warehouse:
    driver: local
  spark_logs:
    driver: local
  spark_history_logs:
    driver: local
  spark_worker_data:
    driver: local
  trino_data:
    driver: local
  trino_worker_data:
    driver: local

networks:
  datastack-net:
    external: true
    name: datastack-net
