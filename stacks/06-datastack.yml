version: "3.8"

# =============================================================================
# DataStack Core - Hive Metastore + Apache Spark + Trino
# Spark Master: node-1 only
# Spark Workers: node-2 and node-3 ONLY (NOT on node-1)
# Trino Coordinator: node-1
# Trino Workers: node-2 and node-3
# Storage: SeaweedFS S3 at http://<ip-node-1>:8333
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Hive Metastore (node-1)
  # Stores metadata for Spark tables and Trino catalogs
  # ---------------------------------------------------------------------------
  hive-metastore:
    image: apache/hive:3.1.3
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://<ip-node-1>:5432/hive_metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive_password_CHANGE_ME
    volumes:
      - hive_warehouse:/opt/hive/data/warehouse
    ports:
      - "9083:9083"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 30s
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9083"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Apache Spark Master (node-1 only)
  # High Availability via Docker Swarm restart policy
  # UI: http://<ip-node-1>:8090
  # ---------------------------------------------------------------------------
  spark-master:
    image: bitnami/spark:3.5
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_MASTER_HOST: <ip-node-1>
      SPARK_MASTER_PORT: "7077"
      SPARK_MASTER_WEBUI_PORT: "8090"
    volumes:
      - /opt/datastack/config/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - spark_logs:/opt/bitnami/spark/logs
    ports:
      - "7077:7077"
      - "8090:8090"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 10s
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Spark Worker on node-2
  # Port 8091 for UI
  # ---------------------------------------------------------------------------
  spark-worker-node2:
    image: bitnami/spark:3.5
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://<ip-node-1>:7077
      SPARK_WORKER_MEMORY: 90G
      SPARK_WORKER_CORES: "28"
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_WORKER_WEBUI_PORT: "8091"
      SPARK_WORKER_HOST: <ip-node-2>
    volumes:
      - /opt/datastack/config/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - spark_worker_data:/opt/bitnami/spark/work
    ports:
      - "8091:8091"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-2
      restart_policy:
        condition: any
        delay: 15s
      resources:
        limits:
          memory: 100G
        reservations:
          memory: 80G

  # ---------------------------------------------------------------------------
  # Spark Worker on node-3
  # Port 8092 for UI
  # ---------------------------------------------------------------------------
  spark-worker-node3:
    image: bitnami/spark:3.5
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://<ip-node-1>:7077
      SPARK_WORKER_MEMORY: 90G
      SPARK_WORKER_CORES: "28"
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_WORKER_WEBUI_PORT: "8092"
      SPARK_WORKER_HOST: <ip-node-3>
    volumes:
      - /opt/datastack/config/spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf:ro
      - spark_worker_data:/opt/bitnami/spark/work
    ports:
      - "8092:8092"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-3
      restart_policy:
        condition: any
        delay: 15s
      resources:
        limits:
          memory: 100G
        reservations:
          memory: 80G

  # ---------------------------------------------------------------------------
  # Trino Coordinator (node-1)
  # UI: http://<ip-node-1>:8080
  # ---------------------------------------------------------------------------
  trino-coordinator:
    image: trinodb/trino:435
    user: "1000:1000"
    volumes:
      - /opt/datastack/config/trino/coordinator:/etc/trino:ro
      - trino_data:/data/trino
    ports:
      - "8080:8080"
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-1
      restart_policy:
        condition: any
        delay: 20s
      resources:
        limits:
          memory: 24G
        reservations:
          memory: 16G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Trino Worker on node-2
  # ---------------------------------------------------------------------------
  trino-worker-node2:
    image: trinodb/trino:435
    user: "1000:1000"
    volumes:
      - /opt/datastack/config/trino/worker:/etc/trino:ro
      - trino_worker_data:/data/trino
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-2
      restart_policy:
        condition: any
        delay: 20s
      resources:
        limits:
          memory: 100G
        reservations:
          memory: 80G

  # ---------------------------------------------------------------------------
  # Trino Worker on node-3
  # ---------------------------------------------------------------------------
  trino-worker-node3:
    image: trinodb/trino:435
    user: "1000:1000"
    volumes:
      - /opt/datastack/config/trino/worker:/etc/trino:ro
      - trino_worker_data:/data/trino
    networks:
      - datastack-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.name == node-3
      restart_policy:
        condition: any
        delay: 20s
      resources:
        limits:
          memory: 100G
        reservations:
          memory: 80G

volumes:
  hive_warehouse:
    driver: local
  spark_logs:
    driver: local
  spark_worker_data:
    driver: local
  trino_data:
    driver: local
  trino_worker_data:
    driver: local

networks:
  datastack-net:
    external: true
    name: datastack-net
